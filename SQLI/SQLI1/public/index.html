<!DOCTYPE html>
<html>
  <head>
    <title>Sessions Practice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Datatype:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./index.css">
    <script src="./index.js" defer></script>
  </head>

  <body>
    <h1>Create an account</h1>

    <span id="sign-in">Already have an account?<br><a href="./login.html">Sign in</a></span>
    
    <form id="register-form">
      <label for="full-name">Full name</label>
      <input id="full-name" name="fullName" type="text" placeholder="Joe Rogan" minlength="3" maxlength="30" required>

      <label for="username">Username</label>
      <input id="username" name="username" type="text" placeholder="joe_420" pattern="[a-zA-Z0-9_]+" minlength="6" maxlength="14" required>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" placeholder="********" required>

      <button>Register</button>
    </form>

    <p id="output"></p>
  </body>
</html>
