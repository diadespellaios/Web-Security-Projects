<!DOCTYPE html>
<html>
  <head>
    <title>Sessions Practice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Datatype:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./login.css">
    <script src="./login.js" defer></script>
  </head>

  <body>
    <h1>Sign-in</h1>
    
    <form id="login-form">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" placeholder="joe_420" pattern="[a-zA-Z0-9_]+" minlength="6" maxlength="14" required>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" placeholder="********" required>

      <button>Login</button>
    </form>

    <p id="output"></p>
    <span id="register">Don't have an account yet?<br><a href="./index.html">Register</a></span>
  </body>
</html>
